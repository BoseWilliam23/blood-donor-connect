    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blood Connect | A Smart Blood Donor Management System</title>

                    "primary": "#b7131a",
                    "surface": "#fcf9f8",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f3f0ef",
                    "on-primary-fixed": "#410002",
                    "surface-container-low": "#f6f3f2",
                    "on-secondary-fixed": "#410002",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#e2e2e2",
                    "on-tertiary-container": "#fcfcfc",
                    "on-primary-container": "#fffbff",
                    "on-surface": "#1b1c1c",
                    "on-secondary-container": "#fffbff",
                    "primary-fixed-dim": "#ffb4ac",
                    "inverse-surface": "#303030",
                    "tertiary-container": "#737575",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e5e2e1",
                    "on-primary-fixed-variant": "#93000d",
                    "inverse-primary": "#ffb4ac",
                    "secondary-container": "#d93630",
                    "on-secondary": "#ffffff",
                    "surface-variant": "#e5e2e1",
                    "on-primary": "#ffffff",
                    "outline-variant": "#e4beb9",
                    "secondary-fixed": "#ffdad6",
                    "on-secondary-fixed-variant": "#93000b",
                    "surface-container": "#f0eded",
                    "primary-fixed": "#ffdad6",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "background": "#fcf9f8",
                    "secondary-fixed-dim": "#ffb4ab",
                    "primary-container": "#db322f",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-background": "#1b1c1c",
                    "surface-container-high": "#eae7e7"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",

            "spacing": {
                    "base": "8px",

                    "xl": "64px",

            },

                    "headline-lg": ["Inter"],
                    "label-sm": ["Inter"],

    <!-- Material icons & Inter Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <style>
      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .hero-gradient {
          background: radial-gradient(circle at top right, rgba(183, 19, 26, 0.05), transparent);
      }
      .bento-card {
          transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      }
      .bento-card:hover {
          transform: translateY(-4px);
      }
      .emergency-pulse {
          animation: pulse-red 2s infinite;
      }
      @keyframes pulse-red {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(183, 19, 26, 0.7); }
          70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(183, 19, 26, 0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(183, 19, 26, 0); }
      }
      .donor-card-hover:hover {
          transform: translateY(-4px);
          box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.12);
      }
    </style>
  </head>
  <body class="bg-background text-on-background selection:bg-primary/20">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
